    { name = "hmac", version = "0.12.1", reason = "transitive from ecdsa/p256 via aws-config alongside aws-sigv4 hmac 0.13" },
    { name = "nix", version = "0.28.0", reason = "portable-pty 0.9 pins nix 0.28; rmcp/process-wrap pulls nix 0.31" },
    { name = "cfg_aliases", version = "0.1.1", reason = "transitive from nix 0.28 via portable-pty" },
    { name = "windows-sys", version = "0.45.0", reason = "hyper 0.14/socket2 chain alongside tauri desktop stack" },
    { name = "windows-sys", version = "0.52.0", reason = "ring/rustls aws-sdk chain alongside tauri desktop stack" },
