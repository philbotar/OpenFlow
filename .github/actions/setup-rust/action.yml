name: Setup Rust
description: Restore shared rustup cache, then install a Rust toolchain.

inputs:
  toolchain:
    description: Toolchain channel or pinned version (default from rust-toolchain.toml when stable).
    required: false
    default: stable
  components:
    description: Extra rustup components (comma-separated). rust-toolchain.toml components apply for stable.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Restore rustup cache
      uses: actions/cache@v4
      id: rustup-cache
      with:
        path: |
          ~/.rustup
          ~/.cargo/bin/
        key: rustup-${{ inputs.toolchain }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
        restore-keys: |
          rustup-${{ inputs.toolchain }}-

    - name: Install toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}

    # .cargo/config.toml sets linker = "rust-lld"; rustup keeps it under
    # lib/rustlib/<host>/bin, not on PATH by default.
    - name: Put rust-lld on PATH
      shell: bash
      run: |
        host="$(rustc -vV | awk '/^host:/{print $2}')"
        bin_dir="$(rustc --print sysroot)/lib/rustlib/${host}/bin"
        echo "${bin_dir}" >> "${GITHUB_PATH}"
        export PATH="${bin_dir}:${PATH}"
        command -v rust-lld
