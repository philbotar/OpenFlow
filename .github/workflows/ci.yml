name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIRI_NIGHTLY: nightly-2026-06-20
  MIRI_TOOLCHAIN: nightly-2026-06-20
  RUST_CACHE_SHARED_KEY: ci-verify

permissions:
  contents: read

jobs:
  version:
    name: Version bump (per crate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}"

      - name: Check version bumps
        env:
          VERSION_CHECK_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event.before != '0000000000000000000000000000000000000000' && github.event.before || '') }}
        run: ./scripts/check-version-bump.sh

      - name: Check release version alignment
        env:
          VERSION_CHECK_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event.before != '0000000000000000000000000000000000000000' && github.event.before || '') }}
        run: ./scripts/check-release-version.sh

  build:
    name: Build (warm cache)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install Linux system dependencies (Tauri)
        run: ./scripts/install-ci-deps.sh

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/ui/package-lock.json

      - name: Install npm dependencies
        run: npm ci --prefix crates/ui

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_CACHE_SHARED_KEY }}
          cache-on-failure: true

      - name: Warm workspace build
        run: cargo build --workspace --all-targets --quiet

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_CACHE_SHARED_KEY }}
          cache-on-failure: true

      - name: Run fmt
        run: ./scripts/verify/fmt.sh

  clippy:
    name: clippy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install Linux system dependencies (Tauri)
        run: ./scripts/install-ci-deps.sh

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_CACHE_SHARED_KEY }}
          cache-on-failure: true

      - name: Run clippy
        run: ./scripts/verify/clippy.sh

  test:
    name: test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/ui/package-lock.json

      - name: Install npm dependencies
        run: npm ci --prefix crates/ui

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_CACHE_SHARED_KEY }}
          cache-on-failure: true

      - name: Run test-fast
        run: ./scripts/test-fast.sh --execution

  ui:
    name: ui
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/ui/package-lock.json

      - name: Install npm dependencies
        run: npm ci --prefix crates/ui

      - name: Run ui-typecheck
        run: ./scripts/verify/ui-typecheck.sh

      - name: Run ui-test
        run: ./scripts/verify/ui-test.sh

  lint-extras:
    name: lint-extras
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: ./.github/actions/setup-rust

      - name: Setup Rust (nightly)
        uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Install cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete

      - name: Install typos
        uses: taiki-e/install-action@v2
        with:
          tool: typos

      - name: Install cargo-public-api
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-public-api

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_CACHE_SHARED_KEY }}
          cache-on-failure: true

      - name: Run machete
        run: ./scripts/verify/machete.sh

      - name: Run typos
        run: ./scripts/verify/typos.sh

      - name: Run deny
        run: ./scripts/verify/deny.sh

      - name: Run arch
        run: ./scripts/check-architecture.sh

      - name: Run doc
        run: ./scripts/verify/doc.sh

      - name: Run public-api
        run: ./scripts/check-engine-public-api.sh

  miri-changes:
    name: Detect Miri crates
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}"

      - name: Detect Miri crates
        id: detect
        env:
          VERSION_CHECK_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event.before != '0000000000000000000000000000000000000000' && github.event.before || '') }}
        run: ./scripts/ci-miri-matrix.sh

  miri:
    name: Miri (${{ matrix.crate }})
    needs: miri-changes
    if: needs.miri-changes.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_TARGET_DIR: target/miri
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJSON(needs.miri-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (Miri)
        uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ env.MIRI_NIGHTLY }}
          components: miri

      - name: Cache Miri sysroot
        uses: actions/cache@v4
        with:
          path: ~/.cache/miri
          key: miri-sysroot-${{ runner.os }}-${{ env.MIRI_NIGHTLY }}-x86_64-unknown-linux-gnu

      - name: Cache Miri build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            .
          cache-on-failure: true
          shared-key: miri

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Test with Miri
        run: ./scripts/miri.sh ${{ matrix.crate }}
