name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (blocking)
    runs-on: ubuntu-latest
    env:
      VERIFY_SHARE_TARGET: "1"
      VERIFY_FAIL_FAST: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/ui/package-lock.json

      - name: Install npm dependencies
        run: npm ci --prefix crates/ui

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      - name: Run CI verification gate
        run: ./scripts/verify-ci.sh

  miri:
    name: Miri (engine + orchestration UB)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Miri
        run: |
          rustup toolchain install nightly --component miri
          cargo +nightly miri setup

      - name: Cache Miri build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            .
          cache-on-failure: true
          shared-key: miri

      - name: Test with Miri
        run: ./scripts/miri.sh
