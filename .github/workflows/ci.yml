name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_CACHE_SHARED_KEY: ci-verify

permissions:
  contents: read

jobs:
  version:
    name: Version bump (per crate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}"

      - name: Check version bumps
        env:
          VERSION_CHECK_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event.before != '0000000000000000000000000000000000000000' && github.event.before || '') }}
        run: ./scripts/check-version-bump.sh

      - name: Check release version alignment
        env:
          VERSION_CHECK_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event.before != '0000000000000000000000000000000000000000' && github.event.before || '') }}
        run: ./scripts/check-release-version.sh

  detect:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.f.outputs.rust }}
      ui: ${{ steps.f.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: f
        with:
          # rust excludes crates/ui/** so UI-only PRs don't trigger the Rust chain.
          filters: |
            rust:
              - 'crates/engine/**'
              - 'crates/providers/**'
              - 'crates/orchestration/**'
              - 'crates/desktop/**'
              - 'crates/workspace-checks/**'
              - 'Cargo.lock'
              - 'Cargo.toml'
              - 'rust-toolchain.toml'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
              - 'scripts/**'
            ui:
              - 'crates/ui/**'

  build:
    name: Build (warm cache)
    needs: detect
    if: needs.detect.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install Tauri Linux deps (cached)
        uses: ./.github/actions/install-tauri-deps

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/ui/package-lock.json

      - name: Install npm dependencies
        run: npm ci --prefix crates/ui

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_CACHE_SHARED_KEY }}
          cache-on-failure: true

      - name: Warm workspace build
        run: cargo build --workspace --all-targets --quiet

  fmt:
    name: fmt
    needs: detect
    if: needs.detect.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_CACHE_SHARED_KEY }}
          cache-on-failure: true

      - name: Run fmt
        run: ./scripts/verify/fmt.sh

  clippy:
    name: clippy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install Tauri Linux deps (cached)
        uses: ./.github/actions/install-tauri-deps

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_CACHE_SHARED_KEY }}
          cache-on-failure: true

      - name: Run clippy
        run: ./scripts/verify/clippy.sh

  test:
    name: test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/ui/package-lock.json

      - name: Install npm dependencies
        run: npm ci --prefix crates/ui

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_CACHE_SHARED_KEY }}
          cache-on-failure: true

      - name: Run test-fast
        run: ./scripts/test-fast.sh --execution --skip-ui-typecheck

      - name: Providers Bedrock (feature-gated AWS)
        run: ./scripts/verify/test-providers-bedrock.sh

  ui:
    name: ui
    needs: detect
    if: needs.detect.outputs.ui == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/ui/package-lock.json

      - name: Install npm dependencies
        run: npm ci --prefix crates/ui

      - name: Run ui-typecheck
        run: ./scripts/verify/ui-typecheck.sh

      - name: Run ui-test
        run: ./scripts/verify/ui-test.sh

  lint-extras:
    name: lint-extras
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: ./.github/actions/setup-rust

      - name: Setup Rust (nightly)
        uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly

      - name: Install Tauri Linux deps (cached)
        uses: ./.github/actions/install-tauri-deps

      - name: Install cargo tools (cached)
        uses: ./.github/actions/install-cargo-tools

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_CACHE_SHARED_KEY }}
          cache-on-failure: true

      - name: Run machete
        run: ./scripts/verify/machete.sh

      - name: Run typos
        run: ./scripts/verify/typos.sh

      - name: Run deny
        run: ./scripts/verify/deny.sh

      - name: Run arch
        run: ./scripts/check-architecture.sh

      - name: Run doc
        run: ./scripts/verify/doc.sh

      - name: Run public-api
        run: ./scripts/check-engine-public-api.sh

  verify:
    name: Verify (blocking)
    needs: [detect, build, fmt, clippy, test, ui, lint-extras]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        if: ${{ contains(join(needs.*.result, ','), 'failure') }}
        run: exit 1
      - run: echo "All verify checks passed"
