name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  MIRI_NIGHTLY: nightly-2026-06-20
  MIRI_TOOLCHAIN: nightly-2026-06-20

permissions:
  contents: write

jobs:
  release-verify:
    name: Release verify (Miri + deep tests)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: ./.github/actions/setup-rust

      - name: Setup Rust (nightly + miri)
        uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ env.MIRI_NIGHTLY }}
          components: miri

      - name: Install Tauri Linux deps (cached)
        uses: ./.github/actions/install-tauri-deps

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache Miri sysroot
        uses: actions/cache@v4
        with:
          path: ~/.cache/miri
          key: miri-sysroot-${{ runner.os }}-${{ env.MIRI_NIGHTLY }}-x86_64-unknown-linux-gnu

      - name: Cache Rust + Miri build artifacts
        uses: swatinem/rust-cache@v2
        with:
          # scripts/miri.sh exports CARGO_TARGET_DIR=target/miri for the Miri run only; the deep
          # checks use ./target. swatinem does not read CARGO_TARGET_DIR, so target/miri must be
          # listed explicitly (this also fixes the prior ./target mis-cache from the old ci.yml job).
          workspaces: |
            . -> target
            . -> target/miri
          cache-on-failure: true
          shared-key: release-verify

      - name: Miri (engine + orchestration)
        run: ./scripts/miri.sh

      - name: Free Miri build artifacts before deep tests
        run: |
          test "$PWD" = "$GITHUB_WORKSPACE"
          test -f "$GITHUB_WORKSPACE/Cargo.toml"
          find "$GITHUB_WORKSPACE/target/miri" -depth -delete
          df -h "$GITHUB_WORKSPACE"

      - name: Deep tests (execution + desktop)
        run: ./scripts/test-fast.sh --execution --desktop --skip-ui-typecheck

      - name: Orchestration E2E
        run: cargo nextest run -p orchestration --test workflow_e2e --no-capture

  release:
    needs: release-verify
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix crates/ui

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Verify tag matches desktop version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          ver=$(jq -r '.version' crates/desktop/tauri.conf.json)
          if [[ "$tag" != "$ver" ]]; then
            echo "error: tag v${tag} does not match desktop version ${ver}" >&2
            echo "Run ./scripts/cut-release.sh on main, commit, then tag v${ver}." >&2
            exit 1
          fi

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: crates/desktop

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/desktop
          tagName: v__VERSION__
          releaseName: OpenFlow v__VERSION__
          releaseBody: |
            macOS auto-update release. Publish this draft after review.

            **First-time setup:** add repo secret `TAURI_SIGNING_PRIVATE_KEY` with the
            private key from `tauri signer generate` (see workflow comments in PR).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
